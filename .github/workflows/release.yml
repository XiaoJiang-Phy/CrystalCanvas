name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        run: npm install -g pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf clang cmake cmake-data libcairo2-dev python3 python3-pip

      - name: install frontend dependencies
        run: pnpm install

      - name: extract changelog
        id: extract_changelog
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          # Remove 'v' prefix if exists
          VERSION_NUM="${VERSION#v}"
          # Find the start line for this version (match ## [0.1.0] or ## 0.1.0)
          START_LINE=$(grep -nE "^## \[?$VERSION_NUM" CHANGELOG.md | cut -d: -f1 | head -1)
          if [ -n "$START_LINE" ]; then
            # Find the next version heading or end of file
            END_LINE=$(tail -n +$((START_LINE + 1)) CHANGELOG.md | grep -nE "^## " | head -1 | cut -d: -f1)
            if [ -n "$END_LINE" ]; then
              BODY=$(sed -n "$((START_LINE + 1)),$((START_LINE + END_LINE - 1))p" CHANGELOG.md)
            else
              BODY=$(tail -n +$((START_LINE + 1)) CHANGELOG.md)
            fi
            # Use multi-line output for GITHUB_OUTPUT
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$BODY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=See the CHANGELOG.md for details." >> $GITHUB_OUTPUT
          fi

      - name: build and release app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CrystalCanvas ${{ github.ref_name }}"
          releaseBody: "${{ steps.extract_changelog.outputs.body }}"
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
