name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        run: npm install -g pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf clang cmake cmake-data libcairo2-dev python3 python3-pip

      - name: install frontend dependencies
        run: pnpm install

      - name: extract changelog
        id: extract_changelog
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          # Use python3 or python
          if command -v python3 >/dev/null 2>&1; then
            PYTHON_EXE=python3
          else
            PYTHON_EXE=python
          fi
          $PYTHON_EXE -c "
          import sys, re
          try:
              version = '${VERSION_NUM}'
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              
              start_idx = -1
              for i, line in enumerate(lines):
                  if re.match(rf'^## \[?{re.escape(version)}', line):
                      start_idx = i
                      break
              
              if start_idx == -1:
                  print('See CHANGELOG.md for details.')
                  sys.exit(0)
              
              body_lines = []
              for i in range(start_idx + 1, len(lines)):
                  if lines[i].startswith('## '):
                      break
                  body_lines.append(lines[i])
              
              print(''.join(body_lines).strip())
          except Exception as e:
              print(f'Error extracting changelog: {e}')
              print('See CHANGELOG.md for details.')
          " > changelog_body.txt
          
          # Write to GITHUB_OUTPUT using multiline heredoc
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat changelog_body.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: build and release app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CrystalCanvas ${{ github.ref_name }}"
          releaseBody: "${{ steps.extract_changelog.outputs.body }}"
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
